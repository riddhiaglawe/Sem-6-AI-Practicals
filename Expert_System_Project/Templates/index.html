<!DOCTYPE html>
<html>
<head>
<title>Motor Check</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Industrial Motor Condition Check</h2>

<form method="POST">

<label>Temperature (°C)</label>
<input type="number" name="temperature" required>

<label>Vibration Level</label>
<select name="vibration">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Oil Level</label>
<select name="oil">
<option>Normal</option>
<option>Low</option>
</select>

<label>Battery Status</label>
<select name="battery">
<option>Normal</option>
<option>Low</option>
</select>

<label>Noise Level</label>
<select name="noise">
<option>Low</option>
<option>High</option>
</select>

<button type="submit">Analyze Motor</button>

</form>

<br>

<a href="/download">
<button>Download Report</button>
</a>

{% if result %}

<div class="result">

<h3>Maintenance Suggestions:</h3>

<ul>
{% for item in result %}
<li>{{item}}</li>
{% endfor %}
</ul>

</div>

{% endif %}

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
